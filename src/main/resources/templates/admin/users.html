<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">

<head>
    <title layout:fragment="title">Quản lý Người dùng</title>
</head>

<section layout:fragment="content">
    
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-header h2 { color: #1b4332; font-weight: 700; text-transform: uppercase; margin: 0; }
        
        .user-table-wrapper { background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background-color: #1b4332; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        /* CSS cho form đổi mật khẩu ngay tại dòng */
        .pass-form { display: flex; gap: 5px; align-items: center; }
        .pass-input {
            width: 120px; padding: 5px 8px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 13px; color: #333;
        }
        .btn-save-pass {
            background: #2d6a4f; color: white; border: none; padding: 6px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-save-pass:hover { background: #1b4332; }

        /* Nút Xóa */
        .btn-delete {
            color: #c0392b; background: #fdedec; padding: 6px 12px;
            border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 12px;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-delete:hover { background: #fadbd8; }
        
        /* Role badge */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .role-admin { background: #e74c3c; color: white; }
        .role-user { background: #3498db; color: white; }
    </style>

    <div class="page-header">
        <h2>Danh sách & Mật khẩu User</h2>
        </div>

    <div class="user-table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 5%;">ID</th>
                    <th style="width: 25%;">Thông tin</th>
                    <th style="width: 25%;">Mật khẩu</th>
                    <th style="width: 15%;">Vai trò</th>
                    <th style="width: 15%;">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.userId}"></td>
                    
                    <td>
                        <strong th:text="${u.fullName}" style="display:block; color:#333;"></strong>
                        <span th:text="${u.email}" style="font-size:12px; color:#777;"></span>
                    </td>

                    <td>
                        <form action="/admin/users/update-password" method="post" class="pass-form">
                            <input type="hidden" name="userId" th:value="${u.userId}">
                            <input type="text" name="password" th:value="${u.password}" class="pass-input">
                            <button type="submit" class="btn-save-pass" title="Lưu mật khẩu mới">
                                <i class="fas fa-save"></i> Lưu
                            </button>
                        </form>
                    </td>

                    <td>
                        <span class="badge role-admin" th:if="${u.role == 'ROLE_ADMIN' or u.role == 'ADMIN'}">ADMIN</span>
                        <span class="badge role-user" th:if="${u.role == 'ROLE_USER' or u.role == 'USER' or u.role == null}">USER</span>
                    </td>

                    <td>
                        <a th:href="@{'/admin/users/delete/' + ${u.userId}}" 
                           class="btn-delete"
                           onclick="return confirm('Xóa vĩnh viễn user này?');">
                            <i class="fas fa-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
