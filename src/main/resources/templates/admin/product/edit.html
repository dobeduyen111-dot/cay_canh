<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}"><head>
    <title layout:fragment="title">Chỉnh sửa sản phẩm</title>
</head>
<section layout:fragment="content" class="home-content">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
        .form-wrapper {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f2f5; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px; 
            width: 100%;
        }
        .form-wrapper h2 {
            color: #1b4332;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-weight: 700;
            text-align: center;
        }
        .form-card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .form-card br {
            display: none;
        }
        .form-card label {
            display: block;
            margin-bottom: 8px;
            margin-top: 20px;
            font-weight: 600;
            color: #1b4332;
            font-size: 14px;
        }
        .form-card label:first-of-type {
            margin-top: 20px; 
        }
        .form-card input[type="text"],
        .form-card input[type="number"],
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        .form-card input:focus,
        .form-card select:focus,
        .form-card textarea:focus {
            border-color: #2d6a4f;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .form-card textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #1b4332;
            cursor: pointer;
            margin-top: 5px;
        }
        .form-card input[type="hidden"] {
            display: none;
        }
        .form-card button {
            width: 100%;
            background-color: #1b4332;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
            text-transform: uppercase;
        }
        .form-card button:hover {
            background-color: #143625;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.3);
        }
    </style>
    <div class="form-wrapper">
        <h2>Chỉnh sửa sản phẩm</h2>
        <form th:action="@{/admin/product/edit}" th:object="${product}" method="post" class="form-card">
            <input type="hidden" th:field="*{productId}">
            <label>Category ID:</label>
            <input type="number" th:field="*{categoryId}" required><br><br>
            <label>Tên sản phẩm:</label>
            <input type="text" th:field="*{productName}" required><br><br>
            <label>Mô tả:</label>
            <textarea th:field="*{description}"></textarea><br><br>
            <label>Care Guide:</label>
            <textarea th:field="*{careGuide}"></textarea><br><br>
            <label>Giá:</label>
            <input type="number" step="0.01" th:field="*{price}" required><br><br>
            <label>Stock:</label>
            <input type="number" th:field="*{stock}" required><br><br>
            <label>Ảnh (tên file):</label>
            <input type="text" th:field="*{image}"><br><br>
            <label>Hoạt động:</label>
            <input type="checkbox" th:field="*{active}"><br><br>
            <button type="submit">Cập nhật</button>
        </form>
    </div>
</section>
</html>
