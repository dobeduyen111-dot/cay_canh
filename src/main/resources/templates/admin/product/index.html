<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}"><section layout:fragment="content" class="home-content">
<head>
    <title layout:fragment="title">Quản lý Sản phẩm</title>
</head>
<section>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap');
        .home-content {
            font-family: 'Quicksand', sans-serif;
            background-color: #fdfdfd; 
            color: #444;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            color: #2d6a4f; 
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            max-width: 1200px;
            margin: 0 auto 20px auto;
            padding: 0 15px;
        }
        .btn-add {
            padding: 12px 24px;
            background-color: #40916c;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(64, 145, 108, 0.3);
            transition: all 0.3s ease;
        }
        .btn-add:hover {
            background-color: #2d6a4f;
            transform: translateY(-2px);
            color: #fff;
        }
        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .product-box {
            background: #fff;
            border-radius: 20px; 
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .product-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: #d8f3dc;
        }
        .product-box img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .product-box h3 {
            font-size: 18px;
            font-weight: 700;
            color: #1b4332;
            margin: 10px 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 10px;
            color: #666;
        }
        .price-tag {
            color: #2d6a4f;
            font-weight: 700;
            font-size: 16px;
        }
        .desc-text {
            font-size: 13px;
            color: #777;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 38px; 
        }
        .customer-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .btn-detail {
            padding: 8px 15px;
            border: 1px solid #2d6a4f;
            color: #2d6a4f;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-detail:hover {
            background: #e8f5e9;
        }
        .btn-cart {
            padding: 8px 15px;
            background: #d4a373; 
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-cart:hover {
            background: #b08968;
            color: #fff;
        }
        .admin-tools {
            border-top: 1px dashed #eee;
            padding-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn-edit, .btn-delete {
            font-size: 12px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-edit {
            color: #2980b9;
            background: #ebf5fb;
        }
        .btn-edit:hover { background: #d6eaf8; }
        .btn-delete {
            color: #c0392b;
            background: #fdedec;
        }
        .btn-delete:hover { background: #fadbd8; }
    </style>
    <h1>Tất cả sản phẩm</h1>
    <div class="action-bar">
        <a href="/admin/product/add" class="btn-add">
            <i class="fas fa-plus"></i> Thêm sản phẩm mới
        </a>
    </div>
    <div class="product-container">
        <div th:each="p : ${list}" class="product-box">
            <img th:src="@{'/images/' + ${p.image}}" alt="Ảnh sản phẩm">
            <h3 th:text="${p.productName}"></h3>
            <div class="meta-info">
                <span class="price-tag" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"></span>
                <span>|</span>
                <span>Kho: <b th:text="${p.stock}"></b></span>
            </div>
            <div class="desc-text" th:utext="${p.description}"></div>
            <div class="customer-actions">
                <a th:href="@{'/product/' + ${p.productId}}" class="btn-detail">
                    Xem chi tiết
                </a>
                <a th:href="@{'/cart/add/' + ${p.productId}}" class="btn-cart">
                    <i class="fas fa-shopping-cart"></i> Mua ngay
                </a>
            </div>
            <div class="admin-tools">
                <a th:href="@{'/admin/product/edit/' + ${p.productId}}" class="btn-edit">
                    <i class="fas fa-pen"></i> Sửa
                </a>
                <a th:href="@{'/admin/product/delete/' + ${p.productId}}"
                   class="btn-delete"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa cây này không?');">
                    <i class="fas fa-trash"></i> Xóa
                </a>
            </div>
        </div>
    </div>
</section>
</html>
