<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="en"
      layout:decorate="~{shared/layout}">

<section layout:fragment="content" class="home-content">

    <style>
        .payment-wrapper {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            font-family: 'Quicksand', sans-serif;
        }

        .order-summary {
            background: #f7fcf7;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px dashed #2d6a4f;
        }

        .total-amount {
            font-size: 28px;
            color: #164a3e;
            font-weight: 700;
            margin: 10px 0;
        }

        .custom-select {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #333;
            outline: none;
            background: #fff;
        }
        .custom-select:focus {
            border-color: #2d6a4f;
        }

        .btn-pay {
            background: #2d6a4f;
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-pay:hover {
            background: #1b4332;
            box-shadow: 0 5px 15px rgba(27, 67, 50, 0.2);
        }

        #qrBox img {
            width: 100%;
            max-width: 300px; /* Giới hạn chiều rộng QR cho đẹp */
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid #ddd; /* Thêm viền nhẹ cho ảnh */
        }
    </style>


    <div class="payment-wrapper">
        <h2 style="color: #1b4332; margin-bottom: 20px;">Thanh Toán Đơn Hàng</h2>

        <div class="order-summary">
            <p style="margin: 0; color: #666;">
                Mã đơn hàng: <b th:text="'#' + ${order.orderId}"></b>
            </p>

            <div class="total-amount">
                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
            </div>

            <p style="margin: 0; font-size: 13px; color: #888;">
                Vui lòng chọn phương thức thanh toán
            </p>
        </div>


        <form th:action="@{/payment}" method="post" id="paymentForm">
            <input type="hidden" name="orderId" th:value="${order.orderId}" />

            <div style="text-align: left; margin-bottom: 10px; font-weight: 600;">
                Phương thức thanh toán:
            </div>

            <select name="paymentMethod" class="custom-select" id="paymentSelect" required>
                <option value="Tiền mặt">💵 Thanh toán khi giao hàng (COD)</option>
                <option value="Chuyển khoản">🏦 Chuyển khoản ngân hàng</option>
            </select>

            <div id="qrBox" style="display:none; margin: 20px 0; background: #fafafa; padding: 15px; border-radius: 10px;">
                <h4 style="color:#1b4332; font-size:18px; margin-bottom: 5px;">Quét mã QR để thanh toán</h4>
                <p style="color: #666; font-size: 13px;">(Tự động điền số tiền và nội dung)</p>

                <img th:src="@{'https://img.vietqr.io/image/STB-060308333003-print.png?amount=' + ${total} + '&addInfo=SP ' + ${order.orderId}}" 
                     alt="QR Banking Sacombank">

                <p style="font-size: 14px; color: #333; margin-top:15px;">
                    Nội dung chuyển khoản: <b style="color: #d35400;" th:text="'SP ' + ${order.orderId}"></b>
                </p>
            </div>

            <input type="hidden" name="amount" th:value="${total}" />

            <button type="submit" class="btn-pay">
                XÁC NHẬN THANH TOÁN
            </button>
        </form>
    </div>
    
    <script>
        const select = document.getElementById("paymentSelect");
        const qrBox = document.getElementById("qrBox");

        select.addEventListener("change", function () {
            if (select.value === "Chuyển khoản") {
                qrBox.style.display = "block";
                // Hiệu ứng trượt nhẹ nếu thích (Optional)
                qrBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                qrBox.style.display = "none";
            }
        });
    </script>
</section>
</html>
