<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{shared/layout}">
<section layout:fragment="content" class="home-content">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        .home-content {
            font-family: 'Quicksand', sans-serif;
            background-color: #f7fcf7;
            padding: 40px 20px;
            color: #444;
        }
        h1 {
            text-align: center;
            color: #1b4332;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .checkout-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card-box {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            height: fit-content;
        }
        .section-header {
            font-size: 18px;
            font-weight: 700;
            color: #2d6a4f;
            border-bottom: 2px solid #e8f5e9;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .cart-item-row {
            display: flex;
            gap: 15px;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px dashed #eee;
            align-items: center;
        }
        .cart-item-row img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
        }
        .item-info div { margin-bottom: 4px; font-size: 14px; }
        .item-name { font-weight: 700; color: #333; font-size: 15px; }
        .item-price { color: #2d6a4f; font-weight: 600; }
        .total-row {
            text-align: right;
            font-size: 20px;
            font-weight: 700;
            color: #1b4332;
            margin-top: 20px;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Quicksand', sans-serif;
            outline: none;
            transition: 0.3s;
        }
        .form-control:focus { border-color: #2d6a4f; }
        .btn-confirm {
            width: 100%;
            padding: 15px;
            background: #164a3e;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-confirm:hover { background: #10382f; transform: translateY(-2px); }
        @media (max-width: 768px) {
            .checkout-layout { grid-template-columns: 1fr; }
        }
    </style>
    <h1>Xác nhận đơn hàng</h1>
    <div th:if="${#lists.isEmpty(cartItems)}" style="text-align: center; margin-top: 50px;">
        <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png" style="width: 100px; opacity: 0.5;">
        <h3>Giỏ hàng của bạn đang trống</h3>
        <a href="/" style="color: #2d6a4f; text-decoration: underline; font-weight: 600;">Quay lại cửa hàng</a>
    </div>
    <div th:if="${!#lists.isEmpty(cartItems)}" class="checkout-layout">
        <div class="card-box">
            <div class="section-header">Sản phẩm đã chọn</div>
            <div th:each="ci : ${cartItems}" class="cart-item-row">
                <img th:src="@{'/images/' + ${ci.product.image}}">
                <div class="item-info">
                    <div class="item-name" th:text="${ci.product.productName}"></div>
                    <div>Đơn giá: <span th:text="${#numbers.formatDecimal(ci.product.price, 0, 'COMMA', 0, 'POINT')}"></span> đ</div>
                    <div>Số lượng: <b th:text="${ci.quantity}"></b></div>
                    <div class="item-price">
                        Thành tiền: <span th:text="${#numbers.formatDecimal(ci.product.price * ci.quantity, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                    </div>
                </div>
            </div>
            <div class="total-row">
                Tổng cộng: <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
            </div>
        </div>
        <div class="card-box">
            <div class="section-header">Thông tin giao hàng</div>
            <form th:action="@{/checkout}" method="post">
                <div class="form-group">
                    <label>Địa chỉ nhận hàng (*)</label>
                    <input type="text" name="shippingAddress" class="form-control" required placeholder="Số nhà, đường, phường, quận...">
                </div>
                <div class="form-group">
                    <label>Ghi chú thêm (Nếu có)</label>
                    <textarea name="note" class="form-control" rows="4" placeholder="Ví dụ: Giao giờ hành chính..."></textarea>
                </div>
                <button type="submit" class="btn-confirm">
                    TIẾN HÀNH THANH TOÁN
                </button>
            </form>
        </div>
    </div>
</section>
</html>
