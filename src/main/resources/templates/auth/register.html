<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en" layout:decorate="~{shared/layout}">
<section layout:fragment="content" class="home-content">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
        <meta charset="UTF-8">
        <title>Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lora', Georgia, "Times New Roman", serif;
            background-color: #fdfdf9;
            color: #333;
            line-height: 1.6;
        }
        .page-title {
            background-color: #2ecc71;
            padding: 10px 0;
            text-align: center;
            margin-bottom: 50px;
        }
        .page-title h1 {
            color: white;
            font-size: 22px;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .auth-wrapper {
            display: flex;           
            justify-content: space-between; 
            position: relative;     
            padding-bottom: 50px;
        }
        .auth-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background-color: #e5e5e5;
            transform: translateX(-50%);
        }
        .column {
            width: 46%; 
        }
        h2 {
            font-size: 24px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: 500;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 15px;
        }
        .required { color: red; }
        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 0; 
            font-size: 16px;
            outline: none;
            font-family: inherit;
            background: #fff;
        }
        input:focus { border-color: #666; }
        .btn-submit {
            background-color: #1e4d40; 
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
        }
        .btn-submit:hover { background-color: #2a6656; }
        .info-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            font-weight: 400;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .checkbox-container input { width: auto; margin-right: 10px; }
        .lost-password {
            display: block;
            margin-top: 15px;
            color: #333;
            text-decoration: none;
        }
        .lost-password:hover { text-decoration: underline; }
        .message {
            margin-top: 20px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .message.success { background-color: #d4edda; color: #155724; border-color: #c3e6cb; }
        .message.error { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        @media (max-width: 768px) {
            .auth-wrapper { flex-direction: column; }
            .auth-wrapper::after { display: none; } 
            .column { width: 100%; margin-bottom: 50px; }
        }
    </style>
</head>
<body>
    <div class="page-title">
        <h1>ĐĂNG KÝ TÀI KHOẢN</h1>
    </div>
    <div class="container">
        <div class="auth-wrapper">
            <div class="column login-column">
                <h2>ĐĂNG NHẬP</h2>
                <form th:action="@{/login}" method="post">
                    <label>Email <span class="required">*</span></label>
                    <input type="text" name="username" required>
                    <label>Mật khẩu <span class="required">*</span></label>
                    <input type="password" name="password" required>
                    <div class="form-actions">
                        <label class="checkbox-container">
                            <input type="checkbox" name="remember-me"> Ghi nhớ đăng nhập
                        </label>
                    </div>
                    <button type="submit" class="btn-submit">ĐĂNG NHẬP</button>
                    <a href="#" class="lost-password">Quên mật khẩu?</a>
                </form>
            </div>
            <div class="column register-column">
                <h2>ĐĂNG KÝ</h2>
                <form th:action="@{/register}" method="post">             
                    <div class="form-group">
                        <label>Họ tên <span class="required">*</span></label>
                        <input type="text" name="fullName" required />
                    </div>
                    <div class="form-group">
                        <label>Email <span class="required">*</span></label>
                        <input type="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu <span class="required">*</span></label>
                        <input type="password" name="password" required />
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" name="phone" />
                    </div>
                    <div class="form-group">
                        <label>Địa chỉ</label>
                        <input type="text" name="address" />
                    </div>
                    <div class="info-text">
                        <p>Thông tin cá nhân của bạn sẽ được sử dụng để hỗ trợ trải nghiệm trên website này.</p>
                    </div>
                    <button type="submit" class="btn-submit">ĐĂNG KÝ</button>
                </form>
                <div class="message success" th:if="${success}">
                    Đăng ký thành công! Bạn có thể đăng nhập ngay bên cạnh.
                </div>
                <div class="message error" th:if="${error}">
                    Email đã tồn tại hoặc dữ liệu không hợp lệ!
                </div>

            </div>
        </div>
    </div>
</body>
</section>
</html>
