<html xmlns:th="http://www.thymeleaf.org"xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"lang="en"layout:decorate="~{shared/layout}">
<section layout:fragment="content" class="home-content">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
            @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
            .home-content {
                font-family: 'Quicksand', sans-serif;
                background-color: #f7fcf7;
                padding: 0; 
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .auth-overlay-wrapper {
                width: 100%;
                max-width: 1400px;
                padding: 40px;
                box-sizing: border-box;
                background-image: url('https://images.unsplash.com/photo-1541336048184-7221415053b8?q=80&w=1400&auto=format&fit=crop'); 
                background-size: cover;
                background-position: center;
                height: 80vh; 
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                overflow: hidden;
                position: relative;
            }
            .auth-card-backdrop {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(255, 255, 255, 0.6); 
                backdrop-filter: blur(5px); 
            }
            .auth-required-card {
                position: relative;
                z-index: 10;
                max-width: 450px;
                text-align: center;
                background: #fff;
                padding: 35px;
                border-radius: 15px;
                box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            }
            .lock-icon-large {
                color: #1b4332; 
                font-size: 45px;
                margin-bottom: 20px;
            }
            .auth-title {
                color: #1b4332;
                font-size: 26px;
                font-weight: 700;
                margin-bottom: 10px;
            }
            .auth-message {
                color: #555;
                margin-bottom: 30px;
                line-height: 1.6;
            }
            .button-wrapper {
                background: #e9f5ec;
                padding: 18px;
                border-radius: 16px;
                display: flex;
                gap: 15px;
                box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
                margin-top: 15px;
            }
            .btn-common {
                flex: 1; 
                padding: 12px 0;
                text-align: center;
                border-radius: 50px;
                text-decoration: none;
                font-weight: 700;
                font-size: 15px;
                transition: 0.25s ease;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .btn-login-now {
                background: #2d6a4f;
                color: white;
                border: 1px solid #2d6a4f;
            }
            .btn-login-now:hover {
                background: #1b4332;
                box-shadow: 0 5px 12px rgba(27, 67, 50, 0.25);
            }
            .btn-home-link {
                background: white;
                color: #2d6a4f;
                border: 1px solid #a8d5ba;
            }
            .btn-home-link:hover {
                background: #e8f5e9;
                border-color: #2d6a4f;
            }
    </style>
    <div class="auth-overlay-wrapper">
        <div class="auth-card-backdrop"></div> 
        <div class="auth-required-card">
            <div class="lock-icon-large">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="auth-title">
                Bạn cần đăng nhập
            </h1>
            <p class="auth-message">
                Vui lòng đăng nhập để xem những trang này.
            </p>
            <div class="button-wrapper">
                <button id="header-login-btn" class="btn-common btn-login-now"> ĐĂNG NHẬP NGAY
                </button>
                <a th:href="@{/}" class="btn-common btn-home-link">
                    QUAY LẠI
                </a>
            </div>
        </div>
    </div>
</section>
</html>
