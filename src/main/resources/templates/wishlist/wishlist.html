<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/layout}">
<section layout:fragment="content">
    <style>
        .wishlist-container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: auto;
            font-family: sans-serif;
            background-color: #fff;
        }
        .wishlist-container h2 {
            text-align: left;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: normal;
            font-family: serif;
            color: #333;
        }
        .wishlist-container .empty-message {
            text-align: center;
            font-size: 18px;
            color: #777;
            padding: 50px 0;
        }
        .wishlist-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .wishlist-table th {
            text-align: left;
            padding: 15px 10px;
            text-transform: uppercase;
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            border-bottom: 1px solid #eee;
        }
        .wishlist-table tr.product-row {
            border-bottom: 1px solid #eee;
        }
        .wishlist-table td {
            padding: 20px 10px;
            vertical-align: middle;
        }
        .product-info-cell {
            display: flex;
            align-items: center;
        }
        .btn-remove-x {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: 1px solid #ddd;
            border-radius: 50%;
            color: #999;
            text-decoration: none;
            font-size: 18px;
            line-height: 1;
            margin-right: 20px;
            transition: 0.2s;
        }
        .btn-remove-x:hover {
            border-color: #333;
            color: #333;
        }
        .wishlist-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            margin-right: 20px;
            transition: transform 0.2s; 
        }
        .wishlist-thumb:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .wishlist-name {
            margin: 0;
            font-size: 15px;
            font-weight: normal;
            color: #333;
        }
        .wishlist-price {
            font-size: 16px;
            font-weight: bold;
            color: #28a745;
        }

        .btn-add-cart {
            display: inline-block;
            background-color: #333;
            color: #fff;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .btn-add-cart:hover {
            background-color: #28a745; 
        }
    </style>
    
    <div class="wishlist-container">
        <h2>Sản phẩm yêu thích</h2>

        <div th:if="${wishlistItems.isEmpty()}" class="empty-message">
            Chưa có sản phẩm yêu thích nào.
        </div>
        
        <table class="wishlist-table" th:if="${!wishlistItems.isEmpty()}">
            <thead>
                <tr>
                    <th style="width: 50%">PRODUCT NAME</th>
                    <th style="width: 20%">UNIT PRICE</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${wishlistItems}" class="product-row">
                    <td>
                        <div class="product-info-cell">
                            <a th:href="@{'/wishlist/remove/' + ${item.productId}}"
                               class="btn-remove-x"
                               onclick="return confirm('Bạn muốn xoá sản phẩm này khỏi yêu thích?');">×</a>

                            <a th:href="@{'/product/' + ${item.productId}}">
                                <img th:src="@{'/images/' + ${item.image}}" alt="Product" class="wishlist-thumb">
                            </a>

                            <h4 th:text="${item.productName}" class="wishlist-name"></h4>
                        </div>
                    </td>
                    <td>
                        <span class="wishlist-price" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                    </td>
                    <td>
                        <a th:href="@{'/cart/add/' + ${item.productId}}" class="btn-add-cart">
                            Thêm vào giỏ hàng
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
