<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{shared/layout}">
<section layout:fragment="content" class="home-content">
    <style>
        .success-container {
            max-width: 700px;
            margin: 50px auto;
            text-align: center;
            font-family: 'Quicksand', sans-serif;
            background: #fff;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .check-icon {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            color: #2d6a4f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px auto;
        }

        .success-title {
            color: #1b4332;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .success-msg { color: #666; margin-bottom: 30px; }

        .order-details-box {
            background: #f9f9f9;
            padding: 25px;
            border-radius: 12px;
            text-align: left;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
        }
        .detail-row:last-child { border: none; margin: 0; padding: 0; }

        .label { color: #888; font-weight: 500; }
        .value { color: #333; font-weight: 700; text-align: right; }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: #164a3e;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-home:hover { background: #10382f; transform: translateY(-2px); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <div class="success-container">
        <div class="check-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="success-title">Đặt Hàng Thành Công!</h1>
        <p class="success-msg">Cảm ơn bạn đã tin tưởng. Chúng tôi sẽ sớm liên hệ.</p>
        <div class="order-details-box">
            <div class="detail-row">
                <span class="label">Mã đơn hàng:</span>
                <span class="value" th:text="'#' + ${order.orderId}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Trạng thái:</span>
                <span class="value" style="color: #d4a373;" th:text="${order.status}"></span>
            </div>
            <div class="detail-row">
                <span class="label">Tổng thanh toán:</span>
                <span class="value" style="color: #2d6a4f;" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
            </div>
            <div class="detail-row" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                <span class="label">Địa chỉ giao hàng:</span>
                <span class="value" style="text-align: left; line-height: 1.4;" th:text="${order.shippingAddress}"></span>
            </div>
        </div>
        <a href="/product" class="btn-home">
            <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>
</section>
</html>
